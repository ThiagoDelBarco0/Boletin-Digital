<!DOCTYPE html>
<html lang="es">
<head>

<body>
  <div class="container">

    <main>

    <nav class="cuatrimestres">

 <form id="form-notas">

        <tr><td>Practicas Profesionalizantes II</td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td></tr>
        <tr><td>Autogestion</td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td></tr>
        <tr><td>Programación IV</td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td><td><input type="number" min="1" max="10"></td></tr>

    <!-- end of form-notas -->
      <button type="submit" class="guardar"> Guardar Notas </button>
    </form>

    <button onclick="location.href='Inicio3.html'" class="volver-btn">Volver</button>
    <button class="alumnos-btn">Alumnos</button>
  </div>

  <script>

// Buscar alumno por DNI
document.getElementById("buscarAlumno").addEventListener("submit", async (e) => {
  e.preventDefault();
  const dni = document.getElementById("dni").value;

  const res = await fetch("http://localhost:3000/api/buscarAlumno", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ dni })
  });

  const data = await res.json();

  if (!data.success) {
    document.getElementById("infoAlumno").innerHTML = "<p>Alumno no encontrado</p>";
    return;
  }

  document.getElementById("infoAlumno").innerHTML =
    `<p><strong>Alumno:</strong> ${data.user.NombreyApellido} - Curso: ${data.user.Curso}</p>`;

  window.ID_Usuarios = data.user.ID_Usuarios;
  window.CURSO = data.user.Curso;
});


// Guardar notas (ahora manejado en el envío del formulario)
const formNotas = document.getElementById("form-notas");
formNotas.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!window.ID_Usuarios) {
    alert("Primero buscá un alumno");
    return;
  }

  const filas = document.querySelectorAll("#tablaMaterias tr");
  const notasEnviar = [];
  let materiaId = 1;

  filas.forEach(fila => {
    const inputs = fila.querySelectorAll("input");

    notasEnviar.push(
      { ID_Usuarios: window.ID_Usuarios, ID_Materia: materiaId, Curso: window.CURSO, Periodo: "1C", Tipo_de_Nota: "1er", Nota: inputs[0].value },
      { ID_Usuarios: window.ID_Usuarios, ID_Materia: materiaId, Curso: window.CURSO, Periodo: "1C", Tipo_de_Nota: "2do", Nota: inputs[1].value },
      { ID_Usuarios: window.ID_Usuarios, ID_Materia: materiaId, Curso: window.CURSO, Periodo: "1C", Tipo_de_Nota: "Final", Nota: inputs[2].value },

      { ID_Usuarios: window.ID_Usuarios, ID_Materia: materiaId, Curso: window.CURSO, Periodo: "2C", Tipo_de_Nota: "1er", Nota: inputs[3].value },
      { ID_Usuarios: window.ID_Usuarios, ID_Materia: materiaId, Curso: window.CURSO, Periodo: "2C", Tipo_de_Nota: "2do", Nota: inputs[4].value },
      { ID_Usuarios: window.ID_Usuarios, ID_Materia: materiaId, Curso: window.CURSO, Periodo: "2C", Tipo_de_Nota: "Final", Nota: inputs[5].value }
    );

    materiaId++;
  });

  try {
    const res = await fetch("http://localhost:3000/api/guardarNotas", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ notas: notasEnviar })
    });

    if (!res.ok) {
      const errText = await res.text();
      console.error("Error al guardar notas, respuesta del servidor:", errText);
      alert("Ocurrió un error al guardar las notas. Revisa la consola.");
      return;
    }

    const data = await res.json();
    alert(data.msg);
  } catch (err) {
    console.error("Fallo la petición a guardarNotas:", err);
    alert("No se pudo conectar con el servidor. Asegurate de que esté en marcha.");
  }
});
</script>
