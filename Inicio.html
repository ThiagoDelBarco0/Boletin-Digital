  <!-- Créditos -->

  

  <!-- Botón de inicio de sesión -->

  <form action="Login.html" method="get">
    <input type="submit" value="Iniciar Sesión">

  </form>

  <!-- Redes sociales -->

  

  </div>

  <footer class="login-footer">
    <nav class="socials">
      <a href="https://www.instagram.com/cpdeg_tecnica/" aria-label="instagram"> instagram
        
      </a>
      <a 
      href="https://www.facebook.com/share/19qwQRQxAx/" aria-label="facebook"> Facebook
      </a>
    </nav>
  </footer>

 
<script>
// Script para login
if (document.querySelector('.login-form')) {
	document.querySelector('.login-form').addEventListener('submit', async function(e) {
		e.preventDefault();
		const form = e.target;
		const data = {
			email: form.email.value,
			password: form.password.value
		};
		try {
			const res = await fetch('http://localhost:2204/api/login', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(data)
			});
			const result = await res.json();
			if (result.success) {
				document.getElementById('login-msg').textContent = '¡Bienvenido, ' + result.user.nombre + '!';
				// Aquí puedes redirigir a otra página si lo deseas
			} else {
				document.getElementById('login-msg').textContent = 'Error: ' + result.message;
			}
		} catch (error) {
			document.getElementById('login-msg').textContent = 'Error en la conexión';
		}
	});
}
</script>

</body>
</html>
